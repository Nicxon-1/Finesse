<script>
  // Konfigurasi API - Pastikan URL ini benar
  const API_BASE = "https://finesse-production.up.railway.app/api";

  // Fungsi untuk kirim data ke Backend
  async function kirimData(endpoint, method, data = {}) {
    try {
      const response = await fetch(`${API_BASE}${endpoint}`, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      return await response.json();
    } catch (error) {
      console.error("Gagal koneksi ke Railway:", error);
      return { success: false, message: "Server Railway tidak merespons" };
    }
  }

  // Fungsi utama untuk simpan transaksi (seperti yang kamu buat sebelumnya)
  async function simpanTransaksi() {
    const nom = parseInt(document.getElementById('tx-nominal').value);
    const kat = document.getElementById('tx-kategori').value;
    const cat = document.getElementById('tx-catatan').value || kat;
    const tanggal = document.getElementById('tx-tanggal').value;

    if (!nom || nom <= 0) {
      showToast('warn', '⚠️ Nominal salah', 'Masukkan nominal yang benar.');
      return;
    }

    // Panggil Backend
    const result = await kirimData('/transactions', 'POST', {
      user_id: 1, amount: nom, category: kat, note: cat, date: tanggal
    });

    if (result && result.success) {
      showToast('success', '✅ Berhasil!', 'Data tersimpan di Railway.');
      showExpPopup(result.data.xp_earned || 10);
      closeModal('modal-transaksi');
      document.getElementById('tx-nominal').value = '';
    } else {
      showToast('warn', '❌ Backend Error', 'Gagal menyimpan ke server.');
    }
  }

  // Panggil fungsi-fungsi lain yang kamu perlukan di sini (load dashboard, dll)
  window.addEventListener('load', () => {
    console.log("🚀 Finesse Frontend siap!");
    // Kamu bisa panggil fungsi untuk load data awal di sini
  });
</script>
